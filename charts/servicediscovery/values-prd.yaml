revisionHistoryLimit: 1
image:
  # Digest-pinned, not tag-only: this tag was republished with different content
  # while nodes still held the first build under `IfNotPresent`, so pods served a
  # binary predating the /api/remotes endpoint the container shell calls. The
  # digest makes the pull deterministic regardless of what the tag now points at.
  tag: "1.0.0@sha256:83d89b0408edf2660512eef2ce28e1e68b7007776d40a124a4ec30d25d3e64df"

ingress:
  hosts:
    - host: servicediscovery.prd.jdwlabs.com

serviceDiscovery:
  # Schema for the main-line servicediscovery binary: /api/remotes serves this
  # map to the container shell, /api/micro-frontends drives its nav and lazy
  # routes. Both keys are required — the shell only falls back to its build-time
  # manifest when the fetch itself fails, so a well-formed `null` reaches
  # setRemoteDefinitions() unguarded and blanks the page.
  remotes:
    authui: https://authui.prd.jdwlabs.com
    usersui: https://usersui.prd.jdwlabs.com
    rolesui: https://rolesui.prd.jdwlabs.com
  microFrontends:
    - name: authui
      path: auth
      remoteName: authui
      moduleName: ./Routes
      url: https://authui.prd.jdwlabs.com
      icon: login
      title: Auth
      description: This contains sign in and sign up functionality
    - name: usersui
      path: users
      remoteName: usersui
      moduleName: ./Routes
      url: https://usersui.prd.jdwlabs.com
      icon: groups
      title: Users
      description: This contains viewing users and managing profiles functionality
    - name: rolesui
      path: roles
      remoteName: rolesui
      moduleName: ./Routes
      url: https://rolesui.prd.jdwlabs.com
      icon: lock
      title: Roles
      description: This contains viewing and managing roles functionality
  # Legacy-image schema, kept until both generations converge.
  routeRemotes:
    - path: auth
      name: authui
      id: authui/Routes
      entry: https://authui.prd.jdwlabs.com/mf-manifest.json
    - path: users
      name: usersui
      id: usersui/Routes
      entry: https://usersui.prd.jdwlabs.com/mf-manifest.json
    - path: roles
      name: rolesui
      id: rolesui/Routes
      entry: https://rolesui.prd.jdwlabs.com/mf-manifest.json
  componentRemotes:
    - name: AuthWidgetComponent
      id: authui/AuthWidget
      entry: https://authui.prd.jdwlabs.com/mf-manifest.json
  navigationItems:
    - path: auth
      icon: login
      title: Auth
      description: This contains sign in and sign up functionality
    - path: users
      icon: groups
      title: Users
      description: This contains viewing users and managing profiles functionality
    - path: roles
      icon: lock
      title: Roles
      description: This contains viewing and managing roles functionality