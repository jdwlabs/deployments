revisionHistoryLimit: 1

ingress:
  hosts:
    - host: servicediscovery.non.jdwlabs.com

serviceDiscovery:
  routeRemotes:
    - path: auth
      name: authui
      id: authui/Routes
      entry: https://authui.non.jdwlabs.com/mf-manifest.json
    - path: users
      name: usersui
      id: usersui/Routes
      entry: https://usersui.non.jdwlabs.com/mf-manifest.json
    - path: roles
      name: rolesui
      id: rolesui/Routes
      entry: https://rolesui.non.jdwlabs.com/mf-manifest.json
  componentRemotes:
    - name: AuthWidgetComponent
      id: authui/AuthWidget
      entry: https://authui.non.jdwlabs.com/mf-manifest.json
  navigationItems:
    - path: auth
      icon: login
      title: Auth
      description: This contains sign in and sign up functionality
    - path: users
      icon: groups
      title: Users
      description: This contains viewing users and managing profiles functionality
    - path: roles
      icon: lock
      title: Roles
      description: This contains viewing and managing roles functionality
