replicaCount: 0

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

revisionHistoryLimit: 2

image:
  repository: jdwillmsen/jdw-servicediscovery
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []
nameOverride: ""

fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}

podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 9000
  targetPort: 9000

ingress:
  enabled: true
  gateway:
    name: platform-gateway
    namespace: nginx-gateway
    sectionName: https
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: servicediscovery.default.jdwlabs.com

resources:
  requests:
    memory: "32Mi"
    cpu: "10m"
  limits:
    memory: "64Mi"
    cpu: "50m"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

volumes:
  - name: config-volume
    configMap:
      name: servicediscovery-config

volumeMounts:
  - name: config-volume
    mountPath: /app/config

nodeSelector: {}

tolerations: []

affinity: {}

externalSecrets: []

envs:
  SD_PORT: 9000
  SD_CONFIG_PATH: /app/config/config.json

envSecrets: []

serviceDiscovery: {}
