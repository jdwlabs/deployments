image:
  tag: "0.10.14"

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1"

ingress:
  hosts:
    - host: usersrole.prd.jdwlabs.com

externalSecrets:
  - refreshInterval: 1m
    secretStoreName: k8s-secret-store
    secretName: usersrole-pg-prd
  - refreshInterval: 1m
    secretStoreName: vault
    secretName: usersrole-prd

envs:
  UR_PG_DATASOURCE_URL: jdbc:postgresql://platform-postgresql-cluster-prd-rw.database:5432/jdwlabs_prd
  UR_JWT_EXPIRATION_TIME_MS: "7200000"

envSecrets:
  - secretKey: UR_PG_USERNAME
    key: platform-postgresql-cluster-prd-app
    property: username
    secretName: usersrole-pg-prd
  - secretKey: UR_PG_PASSWORD
    key: platform-postgresql-cluster-prd-app
    property: password
    secretName: usersrole-pg-prd
  - secretKey: UR_JWT_SECRET_KEY
    key: usersrole
    property: jwt_key_prd
    secretName: usersrole-prd
