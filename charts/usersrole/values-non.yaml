revisionHistoryLimit: 1

# Memory request trimmed 1Gi -> 512Mi in non only: live usage sits around
# 224Mi, so 512Mi keeps >2x headroom while freeing scheduler capacity. Safe
# only because the startupProbe now covers the slow JVM boot window — a prior
# trim without it let liveness kill pods mid-boot and cause a prod outage.
# The 2Gi limit is deliberately unchanged (boot-time spike allowance). prd
# follows in a separate change only after this soaks in non.
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1"

ingress:
  hosts:
    - host: usersrole.non.jdwlabs.com

externalSecrets:
  - refreshInterval: 1m
    secretStoreName: k8s-secret-store
    secretName: usersrole-pg-non
  - refreshInterval: 1m
    secretStoreName: vault
    secretName: usersrole-non

envs:
  UR_PG_DATASOURCE_URL: jdbc:postgresql://platform-postgresql-cluster-non-rw.database:5432/jdwlabs_non
  UR_JWT_EXPIRATION_TIME_MS: "7200000"

envSecrets:
  - secretKey: UR_PG_USERNAME
    key: platform-postgresql-cluster-non-app
    property: username
    secretName: usersrole-pg-non
  - secretKey: UR_PG_PASSWORD
    key: platform-postgresql-cluster-non-app
    property: password
    secretName: usersrole-pg-non
  - secretKey: UR_JWT_SECRET_KEY
    key: usersrole
    property: jwt_key_non
    secretName: usersrole-non
