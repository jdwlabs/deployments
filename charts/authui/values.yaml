# Only applied when autoscaling.enabled is false; while autoscaling is on the
# HPA owns the replica count and this value is ignored. Kept at 1 so turning
# autoscaling off never scales the workload to zero by accident.
replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

revisionHistoryLimit: 2

image:
  repository: jdwlabs/authui
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  gateway:
    name: platform-gateway
    namespace: nginx-gateway
    sectionName: https
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: authui.default.jdwlabs.com

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

envs:
  ENVIRONMENT: default
  AUTH_BASE_URL: https://usersrole.default.jdwlabs.com

envSecrets: []