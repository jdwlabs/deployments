revisionHistoryLimit: 1

image:
  # Always, not IfNotPresent: non re-uses tags as builds land, and a republished
  # tag otherwise leaves nodes serving whatever layer they cached first.
  pullPolicy: Always

ingress:
  hosts:
    - host: container.non.jdwlabs.com

envs:
  ENVIRONMENT: non
  AUTH_BASE_URL: https://usersrole.non.jdwlabs.com
  SERVICE_DISCOVERY_BASE_URL: https://servicediscovery.non.jdwlabs.com