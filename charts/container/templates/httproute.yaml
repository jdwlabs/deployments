{{- if and .Values.ingress.enabled .Values.ingress.useGatewayAPI -}}
{{- $fullName := include "container.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "container.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ index .Values.ingress.annotations "cert-manager.io/cluster-issuer" | default "letsencrypt-prod" }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.name | default "platform-gateway" }}
      namespace: {{ .Values.ingress.gateway.namespace | default "nginx-gateway" }}
      sectionName: {{ .Values.ingress.gateway.sectionName | default "https" }}
  hostnames:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
